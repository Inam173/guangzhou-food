<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 管理后台 - 广州美食地图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-gradient-to-r from-gray-800 to-gray-700 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">🔧 管理后台</h1>
        <p class="text-gray-300 text-xs">寻味广州</p>
      </div>
      <div class="flex gap-2">
        <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg text-sm transition">
          🏠 主页
        </a>
      </div>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- ===== GitHub 配置 ===== -->
    <section id="configSection" class="bg-white rounded-2xl shadow-sm p-5 border border-gray-200">
      <h2 class="text-lg font-bold text-gray-800 mb-1 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-yellow-400"></span>
        GitHub 连接配置
      </h2>
      <p class="text-xs text-gray-400 mb-4">
        需要 GitHub Personal Access Token 才能保存数据。
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=gzfood-manager" target="_blank" rel="noopener"
           class="text-blue-500 underline">点此创建 Token</a>（选 repo 权限，过期时间选"No expiration"）
      </p>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">GitHub 用户名</label>
          <input type="text" id="cfgOwner" placeholder="例如 tanti"
                 class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">仓库名</label>
          <input type="text" id="cfgRepo" placeholder="例如 guangzhou-food"
                 class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">分支名</label>
          <input type="text" id="cfgBranch" placeholder="main" value="main"
                 class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Personal Access Token</label>
          <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx"
                 class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none font-mono">
        </div>
      </div>

      <div class="flex items-center gap-3 flex-wrap">
        <button id="btnSaveConfig" class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
          💾 保存配置
        </button>
        <button id="btnTestConfig" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
          🔌 测试连接
        </button>
        <span id="configStatus" class="text-xs"></span>
      </div>
    </section>

    <!-- ===== 店铺列表 + 操作区 ===== -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="p-5 flex items-center justify-between flex-wrap gap-3 border-b border-gray-100">
        <div class="flex items-center gap-3">
          <h2 class="text-lg font-bold text-gray-800">📋 店铺列表</h2>
          <span id="adminShopCount" class="text-xs text-gray-400">0 家</span>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <input type="text" id="adminSearchInput" placeholder="搜索..."
                 class="form-input border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none w-40">
          <button id="btnNewShop" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition">
            ➕ 新增店铺
          </button>
          <button id="btnExport" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm transition">
            📥 导出
          </button>
          <button id="btnImport" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm transition">
            📤 导入
          </button>
          <input type="file" id="importFileInput" accept=".json" class="hidden">
        </div>
      </div>

      <!-- 手机端：卡片列表 -->
      <div id="shopListMobile" class="divide-y divide-gray-100 md:hidden">
        <p class="text-center text-gray-300 py-12 text-sm">暂无数据</p>
      </div>

      <!-- 桌面端：表格 -->
      <div class="overflow-x-auto hidden md:block">
        <table class="w-full text-sm" id="shopTable">
          <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">店名</th>
              <th class="text-left px-4 py-3">分类</th>
              <th class="text-center px-4 py-3">评分</th>
              <th class="text-center px-4 py-3">人均</th>
              <th class="text-left px-4 py-3">地址</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody id="shopTableBody">
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== 新增/编辑弹窗 ===== -->
    <div id="formModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-start justify-center p-4 pt-8 overflow-y-auto backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-xl w-full shadow-2xl my-4">
        <div class="flex items-center justify-between p-5 border-b border-gray-100">
          <h3 id="formTitle" class="text-lg font-bold text-gray-800">新增店铺</h3>
          <button id="btnCloseForm" class="w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-500 transition">
            ✕
          </button>
        </div>

        <form id="shopForm" class="p-5 space-y-4">
          <input type="hidden" id="formId">

          <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2 sm:col-span-1">
              <label class="block text-xs font-medium text-gray-600 mb-1">店名 *</label>
              <input type="text" id="formName" required placeholder="例如：惠食佳"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div class="col-span-2 sm:col-span-1">
              <label class="block text-xs font-medium text-gray-600 mb-1">分类 *</label>
              <select id="formCategory" required
                      class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none bg-white">
                <option value="">请选择</option>
                <option value="饭馆">🍚 饭馆</option>
                <option value="茶楼">🫖 茶楼</option>
                <option value="甜品糖水">🍧 甜品糖水</option>
                <option value="小吃">🍢 小吃</option>
                <option value="面馆">🍜 面馆</option>
                <option value="火锅">🍲 火锅</option>
                <option value="大排档">🍻 大排档</option>
                <option value="其他">📌 其他</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">评分 (0-5)</label>
              <input type="number" id="formRating" min="0" max="5" step="0.1" value="4.0"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">人均 (¥)</label>
              <input type="number" id="formPrice" min="0" step="1" placeholder="例如：68"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">地址</label>
              <input type="text" id="formAddress" placeholder="例如：广州市越秀区xxx路"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">纬度 (lat)</label>
              <input type="number" id="formLat" step="any" placeholder="23.1291"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">经度 (lng)</label>
              <input type="number" id="formLng" step="any" placeholder="113.2644"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">图片链接</label>
              <div class="flex gap-2">
                <input type="url" id="formImageUrl" placeholder="https://example.com/photo.jpg"
                       class="form-input flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
                <input type="file" id="formImageFile" accept="image/*"
                       class="hidden">
                <button type="button" id="btnUploadImage"
                        class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition whitespace-nowrap">
                  📁 本地上传
                </button>
              </div>
              <div class="mt-2 bg-gray-50 rounded-lg p-3">
                <div class="flex items-start gap-3">
                  <!-- 模式预览 -->
                  <div class="w-24 h-18 bg-gray-200 rounded-lg overflow-hidden shrink-0" style="aspect-ratio:4/3">
                    <img id="formImagePreview" src="" class="w-full h-full object-cover hidden">
                    <div id="formImagePreviewPlaceholder" class="w-full h-full flex items-center justify-center text-2xl">🍜</div>
                  </div>
                  <div class="flex-1 min-w-0">
                    <label class="block text-xs font-medium text-gray-600 mb-1">展示模式</label>
                    <div class="flex gap-1">
                      <label class="flex-1 cursor-pointer">
                        <input type="radio" name="imageFit" value="cover" checked class="sr-only peer">
                        <span class="block text-center px-2 py-1.5 text-xs rounded-lg border border-gray-300 bg-white peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 transition">🔲 撑满</span>
                      </label>
                      <label class="flex-1 cursor-pointer">
                        <input type="radio" name="imageFit" value="contain" class="sr-only peer">
                        <span class="block text-center px-2 py-1.5 text-xs rounded-lg border border-gray-300 bg-white peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 transition">🖼️ 完整</span>
                      </label>
                      <label class="flex-1 cursor-pointer">
                        <input type="radio" name="imageFit" value="fill" class="sr-only peer">
                        <span class="block text-center px-2 py-1.5 text-xs rounded-lg border border-gray-300 bg-white peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 transition">↔️ 拉伸</span>
                      </label>
                    </div>
                    <p class="text-gray-400 text-xs mt-1" id="imageFitHint">撑满裁剪 — 填满卡片，裁掉多余部分</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">大众点评链接</label>
              <input type="url" id="formDianpingUrl" placeholder="https://www.dianping.com/shop/xxxxx"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">标签（逗号分隔）</label>
              <input type="text" id="formTags" placeholder="粤菜, 老字号, 推荐"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">备注</label>
              <textarea id="formNotes" rows="3" placeholder="你的探店心得..."
                        class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none resize-y"></textarea>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">探店日期</label>
              <input type="date" id="formVisitedDate"
                     class="form-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
            </div>
          </div>

          <div class="flex items-center gap-3 pt-2 border-t border-gray-100">
            <button type="submit" id="btnSubmitForm"
                    class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 rounded-xl transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
              💾 保存到 GitHub
            </button>
            <button type="button" id="btnCancelForm"
                    class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition">
              取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ===== 确认删除弹窗 ===== -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-sm w-full shadow-2xl p-6 text-center">
        <p class="text-4xl mb-3">⚠️</p>
        <p class="text-lg font-bold text-gray-800 mb-1">确认删除？</p>
        <p id="deleteShopName" class="text-sm text-gray-500 mb-4"></p>
        <p class="text-xs text-red-400 mb-4">此操作通过 GitHub API 执行，删除后可通过 git 历史恢复</p>
        <div class="flex gap-3">
          <button id="btnCancelDelete" class="flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-xl text-gray-700 font-medium transition">
            取消
          </button>
          <button id="btnConfirmDelete" class="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 rounded-xl text-white font-medium transition">
            确认删除
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js?v=4"></script>
</body>
</html>
