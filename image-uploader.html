<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖼️ 图片转链接</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .drop-zone {
      border: 2px dashed #d1d5db;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #d97706;
      background: #fffbeb;
    }
    #result:empty { display: none; }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">

  <header class="bg-gradient-to-r from-amber-900 via-amber-800 to-amber-700 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">🖼️ 图片转链接</h1>
      <span class="text-amber-200/60 text-xs">上传到 GitHub → 获取直链</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- 配置区 -->
    <section class="bg-white rounded-2xl shadow-sm p-5 border border-gray-200">
      <h2 class="text-sm font-bold text-gray-700 mb-3">⚙️ GitHub 配置</h2>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">用户名</label>
          <input type="text" id="cfgOwner" placeholder="Inam173"
                 class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-amber-400">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">仓库名</label>
          <input type="text" id="cfgRepo" placeholder="guangzhou-food"
                 class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-amber-400">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Token</label>
          <input type="password" id="cfgToken" placeholder="ghp_..."
                 class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none font-mono focus:border-amber-400">
        </div>
      </div>
      <p class="text-xs text-gray-400 mt-2">配置一次自动保存，下次打开不用再填</p>
    </section>

    <!-- 上传区 -->
    <section class="bg-white rounded-2xl shadow-sm p-8 border border-gray-200 text-center">
      <div id="dropZone" class="drop-zone rounded-2xl py-12 px-6 cursor-pointer transition">
        <div class="text-5xl mb-3">📁</div>
        <p class="text-gray-600 font-medium mb-1">点击选择图片 或 拖拽到此处</p>
        <p class="text-gray-400 text-xs">支持 JPG / PNG / WebP，自动转 1600px WebP 高清 + 800px 缩略图</p>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- 预览 -->
      <div id="previewArea" class="hidden mt-5">
        <img id="previewImage" src="" class="max-h-48 rounded-xl mx-auto shadow-md">
        <p id="previewInfo" class="text-xs text-gray-400 mt-2"></p>
      </div>

      <!-- 进度 -->
      <div id="progressArea" class="hidden mt-5">
        <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
          <div id="progressBar" class="bg-amber-500 h-full rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
        <p id="progressText" class="text-sm text-gray-500 mt-2"></p>
      </div>

      <!-- 结果 -->
      <div id="result" class="mt-5 p-4 bg-green-50 rounded-xl border border-green-200 text-left">
        <p class="text-xs text-green-600 font-medium mb-2">✅ 链接已生成，已复制到剪贴板</p>
        <div class="flex items-center gap-2">
          <input type="text" id="resultUrl" readonly
                 class="flex-1 bg-white border border-green-200 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none font-mono">
          <button id="btnCopy" class="px-3 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm font-medium transition whitespace-nowrap">
            📋 复制
          </button>
        </div>
      </div>
    </section>

    <!-- 使用说明 -->
    <section class="text-center text-xs text-gray-400 pb-8">
      图片自动转为 1600px WebP 高清 + 800px 缩略图，上传到 GitHub · 粘贴到管理后台即可
    </section>

  </main>

  <script>
    // ===== DOM =====
    const $ = s => document.querySelector(s);
    const dropZone = $('#dropZone');
    const fileInput = $('#fileInput');
    const previewArea = $('#previewArea');
    const previewImage = $('#previewImage');
    const previewInfo = $('#previewInfo');
    const progressArea = $('#progressArea');
    const progressBar = $('#progressBar');
    const progressText = $('#progressText');
    const result = $('#result');
    const resultUrl = $('#resultUrl');
    const btnCopy = $('#btnCopy');
    const cfgOwner = $('#cfgOwner');
    const cfgRepo = $('#cfgRepo');
    const cfgToken = $('#cfgToken');

    // ===== 配置持久化 =====
    function loadConfig() {
      cfgOwner.value = localStorage.getItem('imgup_owner') || '';
      cfgRepo.value = localStorage.getItem('imgup_repo') || '';
      cfgToken.value = localStorage.getItem('imgup_token') || '';
    }
    function saveConfig() {
      localStorage.setItem('imgup_owner', cfgOwner.value.trim());
      localStorage.setItem('imgup_repo', cfgRepo.value.trim());
      localStorage.setItem('imgup_token', cfgToken.value.trim());
    }
    [cfgOwner, cfgRepo, cfgToken].forEach(el => el.addEventListener('change', saveConfig));
    loadConfig();

    // ===== 拖拽上传 =====
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    // ===== Canvas 转换图片为 WebP（指定最大宽度） =====
    function convertToWebP(file, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let w = img.naturalWidth;
          let h = img.naturalHeight;
          if (w > maxWidth) {
            h = Math.round(h * maxWidth / w);
            w = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => {
            if (!blob) return reject(new Error('WebP 转换失败（浏览器不支持？）'));
            resolve({ blob, width: w, height: h });
          }, 'image/webp', quality / 100);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('图片加载失败，可能格式不支持（HEIC 请先在手机相册中转换）'));
        };
        img.src = url;
      });
    }

    // ===== Blob 转 Base64 =====
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error('读取失败'));
        reader.readAsDataURL(blob);
      });
    }

    // ===== 上传到 GitHub =====
    async function uploadToGitHub(c, imagePath, base64, label) {
      const apiUrl = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${imagePath}`;
      const resp = await fetchWithTimeout(apiUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${c.token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `📷 ${label}`,
          content: base64,
          branch: 'main',
        }),
      }, 30000);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${resp.status}`);
      }
      return resp.json();
    }

    // ===== 主流程 =====
    async function handleFile(file) {
      const c = { owner: cfgOwner.value.trim(), repo: cfgRepo.value.trim(), token: cfgToken.value.trim() };
      if (!c.owner || !c.repo || !c.token) {
        alert('请先填写 GitHub 配置');
        return;
      }

      if (file.size > 50 * 1024 * 1024) {
        alert('文件超过 50MB，建议先压缩再上传');
        return;
      }

      // 预览
      const previewReader = new FileReader();
      previewReader.onload = () => {
        previewImage.src = previewReader.result;
        previewArea.classList.remove('hidden');
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        previewInfo.textContent = `${file.name} · ${sizeMB} MB → WebP 1600px + 800px`;
      };
      previewReader.readAsDataURL(file);

      result.style.display = 'none';
      progressArea.classList.remove('hidden');
      progressBar.style.width = '5%';
      progressText.textContent = '正在转换为 WebP...';

      try {
        // 生成唯一文件名前缀
        const prefix = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

        // 1. 转 1600px 高清 WebP
        progressBar.style.width = '15%';
        progressText.textContent = '正在生成 1600px 高清版...';
        const hd = await convertToWebP(file, 1600, 92);

        // 2. 转 800px 缩略图 WebP
        progressBar.style.width = '30%';
        progressText.textContent = '正在生成 800px 缩略图...';
        const thumb = await convertToWebP(file, 800, 85);

        // 3. 上传高清版
        progressBar.style.width = '45%';
        progressText.textContent = `正在上传高清版 (${(hd.blob.size/1024).toFixed(0)}KB)...`;
        const hdBase64 = await blobToBase64(hd.blob);
        await uploadToGitHub(c, `images/${prefix}.webp`, hdBase64, `上传 ${file.name} (1600px WebP)`);

        // 4. 上传缩略图
        progressBar.style.width = '70%';
        progressText.textContent = `正在上传缩略图 (${(thumb.blob.size/1024).toFixed(0)}KB)...`;
        const thumbBase64 = await blobToBase64(thumb.blob);
        await uploadToGitHub(c, `images/${prefix}.thumb.webp`, thumbBase64, `上传 ${file.name} (800px 缩略图)`);

        progressBar.style.width = '100%';
        progressText.textContent = '上传完成！';

        const rawUrl = `https://raw.githubusercontent.com/${c.owner}/${c.repo}/main/images/${prefix}.webp`;
        resultUrl.value = rawUrl;
        result.style.display = 'block';

        await navigator.clipboard.writeText(rawUrl);
        showToast(`转换完成！高清 ${(hd.blob.size/1024).toFixed(0)}KB + 缩略图 ${(thumb.blob.size/1024).toFixed(0)}KB，链接已复制`);

        setTimeout(() => {
          progressArea.classList.add('hidden');
          progressBar.style.width = '0%';
        }, 2500);

      } catch (err) {
        progressText.textContent = '转换失败：' + err.message;
        progressBar.style.background = '#ef4444';
        setTimeout(() => {
          progressArea.classList.add('hidden');
          progressBar.style.background = '';
        }, 4000);
      }
    }

    // ===== 手动复制 =====
    btnCopy.addEventListener('click', async () => {
      await navigator.clipboard.writeText(resultUrl.value);
      showToast('已复制！');
    });

    // ===== 工具 =====
    function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-xl text-sm font-medium shadow-lg z-50';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
    }
  </script>
</body>
</html>
