<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍜 寻味广州（个人版）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#d97706',
            warm: '#b45309',
          },
          fontFamily: {
            serif: ['"Noto Serif SC"', 'serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body class="min-h-screen bg-fixed" style="background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 30%, #fde68a 100%)">

  <!-- Header -->
  <header class="bg-gradient-to-r from-amber-900 via-amber-800 to-amber-700 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-wide font-serif">🍜 寻味广州（个人版）</h1>
        <p class="text-amber-200/70 text-xs mt-1 hidden sm:block italic">注：本网页收录所有店铺均为本人自行消费、收藏，所有评价仅代表主观看法。希望对旅行的朋友们选店、逛吃，也有一点微小的帮助~</p>
      </div>
      <a href="admin.html" id="adminLink" class="hidden bg-white/15 hover:bg-white/25 text-white px-4 py-2 rounded-lg text-sm font-medium transition backdrop-blur-sm border border-white/20">
        ✏️ 管理
      </a>
    </div>
  </header>

  <!-- Search & Filters -->
  <div class="max-w-6xl mx-auto px-4 py-6">
    <!-- Search Bar -->
    <div class="relative mb-4">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
      <input
        type="text"
        id="searchInput"
        placeholder="搜店名、地址、标签、备注..."
        class="w-full pl-12 pr-4 py-3 bg-white/80 backdrop-blur rounded-2xl shadow-sm focus:shadow-md border border-amber-200 focus:border-amber-400 focus:ring-2 focus:ring-amber-200 outline-none transition text-lg"
        autocomplete="off"
      >
    </div>

    <!-- Category Tabs -->
    <div class="flex flex-wrap gap-2 mb-4" id="categoryTabs">
      <button data-category="all" class="category-btn active px-4 py-2 rounded-full text-sm font-medium bg-amber-600 text-white shadow-sm transition hover:scale-105">
        全部
      </button>
      <button data-category="饭馆" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍚 饭馆
      </button>
      <button data-category="茶楼" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🫖 茶楼
      </button>
      <button data-category="甜品糖水" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍧 甜品糖水
      </button>
      <button data-category="小吃" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍢 小吃
      </button>
      <button data-category="面馆" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍜 面馆
      </button>
      <button data-category="火锅" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍲 火锅
      </button>
      <button data-category="大排档" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        🍻 大排档
      </button>
      <button data-category="其他" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 shadow-sm transition hover:scale-105 border border-gray-200">
        📌 其他
      </button>
    </div>

    <!-- Count -->
    <div class="flex items-center justify-between flex-wrap gap-3">
      <span id="shopCount" class="text-sm text-gray-400">共 0 家</span>
    </div>
  </div>

  <!-- Card Grid -->
  <main class="max-w-6xl mx-auto px-4 pb-12">
    <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Cards rendered by JS -->
    </div>
    <div id="emptyState" class="hidden text-center py-20">
      <div class="text-6xl mb-4">🍽️</div>
      <p class="text-gray-400 text-lg">还没找到匹配的店铺</p>
      <p class="text-gray-300 text-sm mt-1">去管理后台添加吧！</p>
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
      <!-- Close button -->
      <button id="closeModal" class="absolute top-3 right-3 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-500 transition z-10">
        ✕
      </button>

      <!-- Image (动态替换为轮播) -->
      <div id="modalImageContainer" class="relative">
        <img id="modalImage" src="" alt="" class="w-full h-56 object-cover rounded-t-2xl">
        <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent rounded-t-2xl"></div>
        <span id="modalCategory" class="absolute bottom-3 left-4 px-3 py-1 bg-white/90 backdrop-blur-sm rounded-full text-xs font-bold text-gray-700"></span>
      </div>

      <!-- Content -->
      <div class="p-5">
        <div class="flex items-start justify-between mb-1">
          <h2 id="modalName" class="text-2xl font-bold text-gray-900 font-serif"></h2>
        </div>

        <div class="flex items-center gap-3 mb-4 text-sm">
          <span id="modalRating" class="text-orange-500 font-bold text-lg"></span>
        </div>

        <div class="flex flex-wrap gap-2 mb-4" id="modalTags"></div>

        <div class="bg-orange-50 rounded-xl p-4 mb-4">
          <p id="modalNotes" class="text-gray-700 leading-relaxed text-sm"></p>
        </div>

        <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
          <span>📍</span>
          <span id="modalAddress"></span>
        </div>

        <div id="modalVisitedRow" class="flex items-center gap-2 text-sm text-gray-400">
          <span>📅</span>
          <span id="modalVisitedDate"></span>
        </div>

        <!-- Map Button -->
        <a id="modalMapLink" href="#" target="_blank" rel="noopener"
           class="mt-4 flex items-center justify-center gap-2 w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-xl transition shadow-md">
          🗺️ 打开地图查看位置
        </a>

        <!-- Dianping Button -->
        <a id="modalDianpingLink" href="#" target="_blank" rel="noopener"
           class="mt-2 hidden flex items-center justify-center gap-2 w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 rounded-xl transition shadow-md">
          📋 查看大众点评
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-6 text-gray-300 text-sm border-t border-orange-100">
    寻味广州（个人版）· <span id="footerYear"></span>
  </footer>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();
  </script>
  <script src="app.js?v=10"></script>
</body>
</html>
